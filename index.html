 dag:()=>N(22,58)+N(60,18)+N(98,58)+A(26,53,57,23)+A(64,23,95,53)+A(28,58,93,58),

 shield:()=>`<path d="M60,14 L96,26 V44 C96,62 60,70 60,70 C60,68 24,62 24,44 V26 Z"/>`+`<polyline points="48,42 57,52 74,30"/>`,
 combo:()=>L(24,62,24,12)+L(24,62,110,62)+L(30,16,104,56,'stroke-dasharray="3 3" opacity="0.6"')+`<path d="M30,16 Q44,52 104,56"/>`+N(30,16,3)+N(104,56,3),

function glyph2d(k){const mp={score:'gauge',ffl:'motif'};const kk=mp[k]||k;return `<svg class="gsvg" viewBox="0 0 120 80">${(G[kk]||G.dag)()}</svg>`;}
// ════════ shared 3D resources (Atlas-III-3D aesthetic) ════════
const cv=document.getElementById("gl");
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true,powerPreference:"high-performance"});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.autoClear=false;
renderer.setClearColor(0x000000,0);
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.2;
addEventListener("resize",()=>renderer.setSize(innerWidth,innerHeight));
const camera=new THREE.PerspectiveCamera(45,1,0.1,100); camera.position.set(0,0,5.4);
const sphereGeo=new THREE.SphereGeometry(1,22,22);
function glowTexture(){const c=document.createElement("canvas");c.width=64;c.height=64;const x=c.getContext("2d");const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,"rgba(255,255,255,0.85)");g.addColorStop(0.3,"rgba(255,255,255,0.25)");g.addColorStop(1,"rgba(255,255,255,0)");x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}
const GLOW=glowTexture();
function lightRig(sc){sc.add(new THREE.AmbientLight(0x33446a,0.7));
 const d=new THREE.DirectionalLight(0xffffff,1.4);d.position.set(3,5,4);sc.add(d);
 const p1=new THREE.PointLight(0x00d4ff,0.55,40);p1.position.set(-4,2,4);sc.add(p1);
 const p2=new THREE.PointLight(0xa855f7,0.45,40);p2.position.set(4,-2,-3);sc.add(p2);}
function buildScene(nodes,edges,hex){
  const sc=new THREE.Scene(); lightRig(sc);
  const group=new THREE.Group(); sc.add(group);
  const base=new THREE.Color(hex), red=new THREE.Color(0xE63946);
  nodes.forEach(n=>{
    const col=n[3]==='r'?red:base;
    const s=(n[4]||1)*0.40;
    const mat=new THREE.MeshPhysicalMaterial({color:col,metalness:0.15,roughness:0.28,clearcoat:0.4,clearcoatRoughness:0.4,emissive:col.clone().multiplyScalar(0.35),emissiveIntensity:0.6});
    const m=new THREE.Mesh(sphereGeo,mat); m.position.set(n[0],n[1],n[2]); m.scale.set(s,s,s); group.add(m);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:col,blending:THREE.AdditiveBlending,transparent:true,opacity:0.55,depthWrite:false}));
    spr.position.copy(m.position); spr.scale.set(s*4.2,s*4.2,1); group.add(spr);
  });
  if(edges&&edges.length){const ep=[],ec=[];edges.forEach(([a,b])=>{const na=nodes[a],nb=nodes[b];ep.push(na[0],na[1],na[2],nb[0],nb[1],nb[2]);for(let k=0;k<2;k++)ec.push(base.r,base.g,base.b,0.6);});
   const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(ep,3));g.setAttribute('color',new THREE.Float32BufferAttribute(ec,4));
   group.add(new THREE.LineSegments(g,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.6})));
   group.add(new THREE.LineSegments(g.clone(),new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.16,blending:THREE.AdditiveBlending,depthWrite:false})));}
  return {scene:sc,group,phase:Math.random()*6.28,spin:0.45+Math.random()*0.2};
}
// ════════ molecular MOTIFS (one algorithmic structure per module) ════════
function ring(n,r,y,z){const a=[];for(let i=0;i<n;i++){const t=i/n*Math.PI*2;a.push([Math.cos(t)*r,(y||0),Math.sin(t)*r*(z||1)]);}return a;}

 dag:{n:[[-1.5,-0.9,0],[0,1.3,.3],[1.5,-0.9,-.2]],e:[[0,1],[1,2],[0,2]]},

 rank:{n:[[-1.4,.9,0,'',1.15],[0,.1,0,'',.9],[1.4,-.7,0,'',.7]],e:[[0,1],[1,2]]},

 cohort:{n:[[-1.7,0,0,'',1.2],[1.3,1.1,0],[1.7,0,0],[1.3,-1.1,0]],e:[[0,1],[0,2],[0,3]]},
 compare:{n:[[-1.9,.6,0],[-1.9,-.6,0],[-.9,0,.2],[.9,0,-.2],[1.9,.6,0],[1.9,-.6,0]],e:[[0,2],[1,2],[3,4],[3,5]]},

 gap:{n:[[-1.8,0,0],[-.9,0,.2],[.9,0,-.2,'r',.7],[1.8,0,0]],e:[[0,1],[2,3]]},
 arbiter:{n:[[0,-.6,0,'',1.0],[-1.6,.5,0],[1.6,.5,0],[-1.6,-.6,0,'',.8],[1.6,-.6,0,'',.8]],e:[[0,1],[0,2],[1,3],[2,4]]},
 dossier:{n:[[0,1.3,0,'',.95],[0,.45,.1],[0,-.45,-.1],[0,-1.3,0],[1.1,-1.3,0,'',.7]],e:[[0,1],[1,2],[2,3],[3,4]]},
};
function makeHero(){
  const cols=[0xE63946,0xD4A017,0x4C8DFF,0x19C3B2,0xA78BFA,0x46D17F,0xFF8A4C];
  const nodes=[],edges=[];const centers=[];
  for(let c=0;c<5;c++){const a=c/5*6.28+0.3;centers.push([Math.cos(a)*1.6,(Math.random()-.5)*1.6,Math.sin(a)*1.6]);}
  for(let i=0;i<46;i++){const c=centers[i%5];nodes.push([c[0]+(Math.random()-.5)*1.8,c[1]+(Math.random()-.5)*1.6,c[2]+(Math.random()-.5)*1.8]);}
  for(let i=0;i<70;i++){const a=(Math.random()*46)|0,b=(Math.random()*46)|0;if(a!==b){const dx=nodes[a][0]-nodes[b][0],dy=nodes[a][1]-nodes[b][1],dz=nodes[a][2]-nodes[b][2];if(dx*dx+dy*dy+dz*dz<2.6)edges.push([a,b]);}}
  // multi-color: build manually (buildScene uses single hex) → tint per node via groups of colors
  const sc=new THREE.Scene();lightRig(sc);const group=new THREE.Group();sc.add(group);
  nodes.forEach((n,i)=>{const col=new THREE.Color(cols[i%cols.length]);const s=(0.5+Math.random()*0.5)*0.34;
    const m=new THREE.Mesh(sphereGeo,new THREE.MeshPhysicalMaterial({color:col,metalness:0.15,roughness:0.28,clearcoat:0.4,emissive:col.clone().multiplyScalar(0.35),emissiveIntensity:0.6}));
    m.position.set(n[0],n[1]*0.8,n[2]);m.scale.set(s,s,s);group.add(m);
    const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:col,blending:THREE.AdditiveBlending,transparent:true,opacity:0.4,depthWrite:false}));spr.position.copy(m.position);spr.scale.set(s*4,s*4,1);group.add(spr);});
  const ep=[],ec=[];edges.forEach(([a,b])=>{ep.push(nodes[a][0],nodes[a][1]*0.8,nodes[a][2],nodes[b][0],nodes[b][1]*0.8,nodes[b][2]);for(let k=0;k<2;k++)ec.push(.6,.7,.9,0.4);});
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(ep,3));g.setAttribute('color',new THREE.Float32BufferAttribute(ec,4));
  group.add(new THREE.LineSegments(g,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.5})));
  return {scene:sc,group,phase:0,spin:0.3};
}

itch, proven live."], ["Validated science", "curve", "6 diseases", "1M+ docs \u00b7 8M+ KG rows \u00b7 156 tests."], ["Reproducible", "compare", "Byte-identical runs", "Same patient \u2192 same ranking, every time."], ["Frontier capability", "cf", "N=1 do-calculus", "Patient-stratified Phase-4 shipping."]]}, {"id": 5, "name": "Uniqueness vs the Field", "short": "vs Field", "sum": "Where BiRAGAS leads the closest disclosed competitors.", "mods": [["Causal layer", "score", "BiRAGAS wins", "CCS+PSI+shield vs 'world models' \u2014 no metric."], ["Perturbation data", "combo", "BiRAGAS wins", "88.9B CRISPR vs none disclosed at scale."], ["Regulatory", "dossier", "BiRAGAS wins", "FDA BQP / CDx vs no disclosed engagement."], ["Proof of build", "test", "BiRAGAS wins", "Deployed & validated vs UX + funding."]]}];

// ════════ render loop (per-card scissor viewports) ════════
let t0=performance.now();
function frame(){
  const t=(performance.now()-t0)/1000;
  renderer.setScissorTest(false); renderer.clear();
  renderer.setScissorTest(true);
  const active=document.querySelector(".scene.active");
  if(active){ active.querySelectorAll(".mol").forEach(el=>{
    const r=el.getBoundingClientRect();
    if(r.width<4||r.height<4||r.bottom<0||r.top>innerHeight) return;
    const S=S3D[el.dataset.key]; if(!S) return;
    const y=innerHeight-r.bottom;
    renderer.setViewport(r.left,y,r.width,r.height);
    renderer.setScissor(r.left,y,r.width,r.height);
    camera.aspect=r.width/r.height; camera.updateProjectionMatrix();
    S.group.rotation.y=t*S.spin+S.phase;
    S.group.rotation.x=0.16*Math.sin(t*0.4+S.phase);
    renderer.render(S.scene,camera);
  });}
  requestAnimationFrame(frame);
}
frame();

 cur=i;setMap(SC[i].map);prog.style.width=((i+1)/N_SC*100)+"%";

 const dur=((a?a.dur:6)*1000)+600;timer=setTimeout(()=>go(i+1),dur);}
function finish(){clearTimeout(timer);sceneEls.forEach(s=>s.classList.remove("active"));sceneEls[N_SC-1].classList.add("active");setMap(999);prog.style.width="100%";replay.style.display="inline-block";}

addEventListener("keydown",e=>{if(cur<0)return;if(e.key==="ArrowRight"||e.key===" ")go(cur+1);else if(e.key==="ArrowLeft")go(cur-1);});
